<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Maps Agro Earth</title>

  <!-- RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- LEAFLET CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- CSS DO PROJETO -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ================= LOGIN / CADASTRO ================= -->
  <div id="auth-container">
    <h2>🌱 Maps Agro Earth</h2>
    <p>Acesso ao sistema</p>

    <form id="login-form">
      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Senha"
        required
      />

      <div class="auth-options">
        <label>
          <input type="radio" name="auth-mode" value="login" checked />
          Login
        </label>

        <label>
          <input type="radio" name="auth-mode" value="signup" />
          Criar conta
        </label>
      </div>

      <button type="submit">Confirmar</button>

      <p id="auth-message"></p>
    </form>
  </div>
