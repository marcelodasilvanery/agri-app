<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Maps Agro Earth</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- LOGIN -->
  <div id="auth-container" class="card">
    <h2>🌱 Maps Agro Earth</h2>

    <input type="text" id="nome" placeholder="Nome (apenas cadastro)" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="senha" placeholder="Senha" />

    <button onclick="signIn()">Entrar</button>
    <button onclick="signUp()">Criar Conta</button>

    <p id="auth-msg"></p>
  </div>

  <!-- APP (COMEÇA ESCONDIDO) -->
  <div id="app-container" style="display:none;">
    <header>
      <h2>🌍 Sistema de Planejamento Agrícola</h2>
      <button onclick="logout()">Sair</button>
    </header>

    <main>
      <p>Status do Sistema</p>
      <ul>
        <li>✔ Usuário autenticado</li>
        <li>✔ Sessão ativa</li>
        <li>🔜 Mapa satélite</li>
      </ul>

      <!-- AQUI depois entra o mapa -->
      <div id="map" style="height:400px;"></div>
    </main>
  </div>

  <!-- JS (ORDEM IMPORTANTE) -->
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
